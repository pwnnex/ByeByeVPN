name: ci

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - 'v2.*'
      - 'ci/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Linux: static analysis + unit tests + a libFuzzer smoke pass. runs
  # on every push / PR. the Windows release job gates on this passing.
  # -------------------------------------------------------------------
  lint-and-test:
    name: lint + unit tests + fuzz smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ clang clang-tidy cppcheck libssl-dev make

      - name: cppcheck (whole src tree)
        run: |
          set -eux
          # warning + performance + portability are the bug- and
          # footgun-catching layers. the `style` layer is dropped: on a
          # mature C++ codebase it is mostly opinion (const-ref loop vars,
          # "use std::count_if") and would bury real findings in noise.
          cppcheck --std=c++20 --quiet --inline-suppr \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            src

      - name: build + run unit tests (-Werror)
        run: |
          set -eux
          # the test target builds the platform-agnostic logic modules
          # plus the doctest driver. -Werror here so a warning fails CI.
          make test CXX='g++ -Werror'

      - name: clang-tidy (platform-agnostic modules)
        run: |
          set -eux
          # only the modules that compile on Linux are linted: the Windows
          # networking / adapter code needs the Win32 SDK headers and is
          # covered by the Windows build job instead.
          #
          # bugprone-* and clang-analyzer-* are the real-bug families. they
          # gate the build (--warnings-as-errors). the broader modernize-* /
          # readability-* opinion layers are intentionally NOT enabled.
          # bugprone-easily-swappable-parameters is excluded too: it is a
          # design-opinion check that flags any two same-typed params, not
          # a bug finder.
          CHECKS='-*,bugprone-*,clang-analyzer-*'
          CHECKS="$CHECKS,-clang-analyzer-optin.*"
          CHECKS="$CHECKS,-bugprone-easily-swappable-parameters"
          for f in src/common/util.cpp src/common/tspu.cpp src/common/config.cpp \
                   src/scan/ja4.cpp src/scan/ja4s_db.cpp src/scan/brand.cpp \
                   src/scan/ports.cpp; do
            clang-tidy --quiet \
              --checks="$CHECKS" \
              --warnings-as-errors='*' \
              "$f" -- -std=c++20 -Isrc
          done

      - name: libFuzzer smoke pass on the JA4 parsers
        run: |
          set -eux
          make fuzz FUZZ_CXX='clang++'
          # short time-boxed run: catches obvious memory-safety regressions
          # in the byte parsers without holding up CI. a real campaign runs
          # this for hours, not 45 seconds.
          ./fuzz_ja4 -max_total_time=45 -timeout=10

  # -------------------------------------------------------------------
  # Linux: the full unit-test suite under AddressSanitizer + UBSan. this
  # is a separate job because the sanitizer runtime roughly doubles build
  # + run time. -fno-sanitize-recover makes any UB a hard failure, so a
  # green run here is a real "no memory bug / no UB" guarantee, not a
  # best-effort one. the Windows release gates on this passing.
  # -------------------------------------------------------------------
  sanitizers:
    name: ASan + UBSan unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libssl-dev make

      - name: build + run test-suite under ASan + UBSan
        run: |
          set -eux
          make test-asan CXX=clang++

  # -------------------------------------------------------------------
  # Windows: the actual static-exe release build. gates on the Linux
  # lint/test and sanitizer jobs. only a tag push produces the uploaded
  # artifact; branch / PR pushes just prove the Windows build still links.
  # -------------------------------------------------------------------
  windows-static:
    name: static exe (Windows)
    needs: [lint-and-test, sanitizers]
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make
            zip
            coreutils
            diffutils
            curl
            tar
            zstd

      - name: verify shipped build-win archives match expected sha
        run: |
          set -eux
          # these sha values come from the public msys2 pkg
          # mingw-w64-ucrt-x86_64-openssl-3.6.2-2 (see BUILD.md).
          # if the repo copy ever diverges, something was tampered with.
          EXPECT_LIBSSL=bf7a501fbcd50db87187ff263c35a264be48dd5ce18278bdf350aa6ad2a6a038
          EXPECT_LIBCRYPTO=23c62ffdef07d5ee2a4667eba45d713b56b5f57cbd0ae4b15dfd761500bd0046
          ACT_LIBSSL=$(sha256sum build-win/libssl.a | cut -d' ' -f1)
          ACT_LIBCRYPTO=$(sha256sum build-win/libcrypto.a | cut -d' ' -f1)
          [ "$ACT_LIBSSL"    = "$EXPECT_LIBSSL"    ] || { echo "build-win/libssl.a sha mismatch, got $ACT_LIBSSL";    exit 1; }
          [ "$ACT_LIBCRYPTO" = "$EXPECT_LIBCRYPTO" ] || { echo "build-win/libcrypto.a sha mismatch, got $ACT_LIBCRYPTO"; exit 1; }
          echo "build-win archives match the sha in BUILD.md"

      - name: cross-check against msys2 repo
        run: |
          set -eux
          # pull the exact pinned pkg from repo.msys2.org and verify the
          # shipped archives are byte-identical to what everyone else gets.
          curl -fsSLo /tmp/openssl.pkg.tar.zst \
            https://repo.msys2.org/mingw/ucrt64/mingw-w64-ucrt-x86_64-openssl-3.6.2-2-any.pkg.tar.zst
          EXPECT_PKG=4b919cc9ed46b55c465a39204bf5034f2d8be931840c6a62ae71b1554bbea9a5
          ACT_PKG=$(sha256sum /tmp/openssl.pkg.tar.zst | cut -d' ' -f1)
          [ "$ACT_PKG" = "$EXPECT_PKG" ] || { echo "pkg sha mismatch, got $ACT_PKG"; exit 1; }
          mkdir -p /tmp/pkg
          tar -xf /tmp/openssl.pkg.tar.zst -C /tmp/pkg
          PKG_SSL=$(sha256sum /tmp/pkg/ucrt64/lib/libssl.a    | cut -d' ' -f1)
          PKG_CRY=$(sha256sum /tmp/pkg/ucrt64/lib/libcrypto.a | cut -d' ' -f1)
          REPO_SSL=$(sha256sum build-win/libssl.a    | cut -d' ' -f1)
          REPO_CRY=$(sha256sum build-win/libcrypto.a | cut -d' ' -f1)
          [ "$REPO_SSL" = "$PKG_SSL" ] || { echo "libssl.a differs from msys2 pkg"; exit 1; }
          [ "$REPO_CRY" = "$PKG_CRY" ] || { echo "libcrypto.a differs from msys2 pkg"; exit 1; }
          echo "build-win archives are bit-identical to msys2 pkg 3.6.2-2"
          # swap the msys2-installed headers into /ucrt64 so the include path
          # matches the library version we link against.
          cp -r /tmp/pkg/ucrt64/include/openssl /ucrt64/include/

      - name: build static exe
        run: |
          set -eux
          make windows-static
          ls -la byebyevpn.exe

      - name: check no mingw/openssl dll leaked into exe
        run: |
          set -eux
          objdump -p byebyevpn.exe | grep "DLL Name" || true
          if objdump -p byebyevpn.exe | grep -Eq "DLL Name: (libssl|libcrypto|libwinpthread|libgcc_|libstdc)"; then
            echo "dynamic dependency on mingw/openssl leaked into the exe"
            exit 1
          fi

      - name: verify no tool-identifying strings on wire paths
        run: |
          set -eux
          # the source is a modular tree under src/. expected non-wire
          # matches: only the --help printf in src/app/cli.cpp. any extra
          # match risks leaking the tool name into a probe / banner / log
          # line. cap at 3 to leave headroom.
          N=$(grep -rnE 'ByeByeVPN|BYEBYEVPN|BBVPN|BBV|pwnnex' \
                src --include='*.cpp' --include='*.h' | wc -l)
          if [ "$N" -gt 3 ]; then
            echo "found $N tool-identifying matches (expected <= 3):"
            grep -rnE 'ByeByeVPN|BYEBYEVPN|BBVPN|BBV|pwnnex' \
              src --include='*.cpp' --include='*.h'
            exit 1
          fi

      - name: compute sha256
        id: hash
        run: |
          set -eux
          H=$(sha256sum byebyevpn.exe | awk '{print $1}')
          echo "exe_sha=$H" >> "$GITHUB_OUTPUT"
          echo "byebyevpn.exe sha256: $H"

      - name: generate SBOM
        id: sbom
        run: |
          set -eux
          # a minimal CycloneDX-flavored SBOM. the point is a verifiable
          # bill of materials: the exact pinned OpenSSL package, its sha, the
          # compiler, and the source revision the exe was built from. paired
          # with the reproducible-build verification above, anyone can
          # rebuild this exe and check it against what we shipped.
          EXE_SHA=$(sha256sum byebyevpn.exe | cut -d' ' -f1)
          GCC_VER=$(gcc -dumpfullversion 2>/dev/null || gcc -dumpversion)
          BUILD_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > byebyevpn-sbom.json <<EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "metadata": {
              "timestamp": "${BUILD_TS}",
              "component": {
                "type": "application",
                "name": "byebyevpn",
                "version": "${GITHUB_REF_NAME:-dev}",
                "description": "TSPU/DPI/VPN detectability scanner",
                "hashes": [
                  { "alg": "SHA-256", "content": "${EXE_SHA}" }
                ]
              },
              "tools": [
                { "name": "mingw-w64-ucrt-x86_64-gcc", "version": "${GCC_VER}" }
              ]
            },
            "components": [
              {
                "type": "library",
                "name": "openssl",
                "version": "3.6.2-2",
                "purl": "pkg:msys2/mingw-w64-ucrt-x86_64-openssl@3.6.2-2",
                "description": "statically linked, pinned msys2 package",
                "hashes": [
                  { "alg": "SHA-256", "content": "4b919cc9ed46b55c465a39204bf5034f2d8be931840c6a62ae71b1554bbea9a5" }
                ]
              },
              {
                "type": "library",
                "name": "doctest",
                "version": "2.4.11",
                "purl": "pkg:github/doctest/doctest@v2.4.11",
                "description": "single-header unit-test framework, test build only"
              }
            ]
          }
          EOF
          sha256sum byebyevpn-sbom.json

      - name: build release zip
        id: zipper
        run: |
          set -eux
          # GITHUB_REF_NAME on a branch push can contain a slash; sanitize
          # it so the zip name is always a single path component.
          VER="${GITHUB_REF_NAME:-dev}"
          SAFE_VER=$(echo "$VER" | tr '/' '_')
          NAME="byebyevpn-${SAFE_VER}-win64.zip"
          mkdir -p dist-release
          cp byebyevpn.exe LICENSE NOTICE README.md CHANGELOG.md byebyevpn-sbom.json dist-release/
          (cd dist-release && zip -9 "../${NAME}" *)
          ZH=$(sha256sum "${NAME}" | awk '{print $1}')
          echo "zip_name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_sha=${ZH}"    >> "$GITHUB_OUTPUT"

      - name: check for signing key
        id: signcheck
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -n "${MINISIGN_KEY}" ]; then
            echo "have_key=yes" >> "$GITHUB_OUTPUT"
          else
            echo "have_key=no" >> "$GITHUB_OUTPUT"
            echo "no MINISIGN_SECRET_KEY secret set — skipping signing (see BUILD.md)"
          fi

      - name: sign release artifacts (minisign)
        if: steps.signcheck.outputs.have_key == 'yes'
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PW:  ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -eu
          # minisign is only needed when a signing key is configured, so it
          # is installed here rather than in the job-wide package list — an
          # unsigned release never depends on it.
          pacman -S --noconfirm --needed minisign
          printf '%s\n' "${MINISIGN_KEY}" > "${RUNNER_TEMP}/minisign.key"
          for f in byebyevpn.exe "${{ steps.zipper.outputs.zip_name }}" byebyevpn-sbom.json; do
            printf '%s\n' "${MINISIGN_PW}" | \
              minisign -S -s "${RUNNER_TEMP}/minisign.key" -m "$f"
          done
          rm -f "${RUNNER_TEMP}/minisign.key"
          ls -la *.minisig

      - uses: actions/upload-artifact@v4
        with:
          name: byebyevpn-win64
          path: |
            byebyevpn.exe
            ${{ steps.zipper.outputs.zip_name }}
            byebyevpn-sbom.json
            *.minisig
          if-no-files-found: warn
